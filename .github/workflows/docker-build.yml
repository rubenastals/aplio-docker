name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'api_server.py'
      - 'restart_api.sh'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:      # permite lanzar manualmente desde GitHub UI
    inputs:
      tag:
        description: 'Image tag (e.g. v3)'
        required: false
        default: 'latest'

env:
  REGISTRY: docker.io
  IMAGE_NAME: rubenastals/applio-whisper-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90     # el build tarda ~45 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ github.event.inputs.tag || 'latest' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de capas entre builds → solo reconstruye lo que cambia
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Summary
        run: |
          echo "## Build completado" >> $GITHUB_STEP_SUMMARY
          echo "**Imagen:** \`${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
